# filename: templates/python-basic-webserver/manifests/deployment.yaml
# Kubernetes deployment configuration for the web application
# Template variables:
# Patechoc - Will be replaced with the GitHub username from the repository URL
# test_python_webapp_depoyment - Will be replaced with the actual repository name
#
# This file is automatically configured during project initialization

apiVersion: apps/v1
kind: Deployment
metadata:
  name: "test_python_webapp_depoyment-deployment"
  labels:
    app: "test_python_webapp_depoyment"
    owner: "Patechoc"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "test_python_webapp_depoyment"
  template:
    metadata:
      labels:
        app: "test_python_webapp_depoyment"
    spec:
      containers:
        - name: "test_python_webapp_depoyment"
          image: ghcr.io/patechoc/test_python_webapp_depoyment:9d83cc0-20260304135136

          ports:
            - containerPort: 3000
          # minimal resources as this is just a test            
          resources:
            limits:
              cpu: "100m"
              memory: "128Mi"
            requests:
              cpu: "50m"
              memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: "test_python_webapp_depoyment-service"
spec:
  selector:
    app: "test_python_webapp_depoyment"
  ports:
    - port: 80
      targetPort: 3000